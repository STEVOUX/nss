<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">

<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<meta http-equiv="Pragma" content="no-cache">
<meta http-equiv="Expires" content="0">

<title>Redirecting...</title>

<script>
const REDIRECT_URL = "https://keralaspot.in/";

// Create meta refresh automatically
const meta = document.createElement("meta");
meta.httpEquiv = "refresh";
meta.content = `0;url=${REDIRECT_URL}`;
document.head.appendChild(meta);

window.location.replace(REDIRECT_URL);

window.onload = () => {
    document.getElementById("redirectLink").href = REDIRECT_URL;
    document.getElementById("redirectLink").textContent = REDIRECT_URL;
};
</script>

</head>

<body>
<p style="font-family:Arial,sans-serif">
Redirecting...<br><br>
If you are not redirected automatically,
<a id="redirectLink" href="#">click here</a>.
</p>
</body>
</html>
